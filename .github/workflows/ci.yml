name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Compile sources
        run: |
          python -m compileall src examples tests scripts/browser-smoke.py scripts/http-client-smoke.py scripts/build-release.py scripts/feedback-summary.py scripts/prepare-design-partner-send.py scripts/rank-design-partners.py scripts/release-readiness.py

      - name: Run unit tests
        run: |
          python -m unittest discover -s tests

      - name: Check shell scripts
        run: |
          sh -n scripts/smoke.sh
          sh -n scripts/alpha-demo.sh
          sh -n scripts/dev-install.sh

      - name: Run no-smoke release readiness
        run: |
          python scripts/release-readiness.py --skip-smoke --no-report

      - name: Build release artifacts
        run: |
          python scripts/build-release.py --json
